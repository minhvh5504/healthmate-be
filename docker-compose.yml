version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: healthmate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthmate_user
      POSTGRES_PASSWORD: healthmate_password_2026
      POSTGRES_DB: healthmate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - healthmate_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthmate_user -d healthmate_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: healthmate_backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://healthmate_user:healthmate_password_2026@postgres:5432/healthmate_db
      
      # JWT Secrets (IMPORTANT: Change these in production)
      JWT_SECRET: healthmate_dev_jwt_secret_key_2026_change_in_production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: healthmate_dev_jwt_refresh_secret_key_2026_change_in_production
      JWT_REFRESH_EXPIRES_IN: 30d
      
      # Application
      PORT: 8080
      NODE_ENV: development
      
      # Frontend URL (for CORS) - FE team should update this to their frontend URL
      FRONTEND_URL: http://localhost:3000
      
      # Email Configuration (Optional - can be configured later)
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USER: youremail@gmail.com
      MAIL_PASSWORD: yourapppassword
      MAIL_FROM: Healthmate <youremail@gmail.com>
      
      # Cloudinary Configuration (Optional - can be configured later)
      CLOUDINARY_CLOUD_NAME: xxx
      CLOUDINARY_API_KEY: xxx
      CLOUDINARY_API_SECRET: xxx
      CLOUDIARY_FOLDER: healthmate
      
      # Google OAuth (Optional - can be configured later)
      GOOGLE_CLIENT_ID: your_google_client_id
      GOOGLE_CLIENT_SECRET: your_google_client_secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthmate_network
    command: >
      sh -c "
        echo '🔄 Waiting for database to be ready...' &&
        sleep 5 &&
        echo '🔄 Running database migrations...' &&
        npx prisma migrate deploy &&
        echo '🌱 Seeding database (if seed file exists)...' &&
        (npx prisma db seed || echo '⚠️  No seed file found, skipping...') &&
        echo '✅ Starting application...' &&
        node dist/src/main.js
      "

volumes:
  postgres_data:
    driver: local

networks:
  healthmate_network:
    driver: bridge
